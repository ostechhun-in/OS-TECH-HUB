 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OS Tech Hub</title>
    <style>
        :root {
            --bg-dark: #0a0a0c;
            --card-bg: #121216;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --neon-cyan: #00f2fe;
            --neon-magenta: #fe019a;
            --neon-purple: #7928ca;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
            padding-bottom: 60px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: rgba(10, 10, 12, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #1f2937;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .cart-btn {
            background: #111;
            color: white;
            border: 1px solid #333;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .cart-btn:hover {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
        }

        .cart-count {
            background: var(--neon-magenta);
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
        }

        .hero {
            text-align: center;
            padding: 60px 20px;
            background: radial-gradient(circle at center, #1a102f 0%, var(--bg-dark) 70%);
        }

        .hero h1 {
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 15px;
            letter-spacing: -1px;
            line-height: 1.1;
        }

        .hero p {
            color: var(--text-muted);
            font-size: 16px;
            max-width: 500px;
            margin: 0 auto;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        .product-card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #1f2937;
            transition: transform 0.3s ease, border-color 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-5px);
            border-color: #374151;
        }

        .image-container {
            position: relative;
            width: 100%;
            padding-top: 100%;
            background: #181820;
        }

        .product-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-nav {
            position: absolute;
            bottom: 10px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 5px;
            z-index: 10;
        }

        .nav-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            cursor: pointer;
        }

        .nav-dot.active {
            background: white;
            box-shadow: 0 0 5px rgba(255,255,255,0.8);
        }

        .product-info {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .product-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .product-price {
            font-size: 20px;
            font-weight: 800;
            color: var(--neon-cyan);
            margin-bottom: 15px;
        }

        .add-to-cart-btn {
            background: linear-gradient(90deg, var(--neon-purple), var(--neon-magenta));
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            margin-top: auto;
            transition: opacity 0.2s ease;
        }

        .add-to-cart-btn:active {
            opacity: 0.8;
        }

        /* Cart Drawer Sidebar */
        .cart-drawer {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            max-width: 400px;
            height: 100%;
            background: #0f0f14;
            box-shadow: -5px 0 25px rgba(0,0,0,0.5);
            z-index: 1000;
            transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            border-left: 1px solid #222;
        }

        .cart-drawer.open {
            right: 0;
        }

        .cart-header {
            padding: 20px;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-cart {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        .cart-items-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .cart-item {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #181820;
            align-items: center;
        }

        .cart-item-img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
        }

        .cart-item-details {
            flex-grow: 1;
        }

        .cart-item-title {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .cart-item-price {
            color: var(--neon-cyan);
            font-weight: 700;
        }

        .remove-item {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 13px;
        }

        .cart-footer {
            padding: 20px;
            border-top: 1px solid #222;
            background: #0a0a0c;
        }

        .cart-total-row {
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .checkout-btn {
            width: 100%;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple));
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
        }

        .cart-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 999;
            display: none;
        }

        .cart-overlay.show {
            display: block;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">OS Tech Hub</div>
        <button class="cart-btn" id="open-cart-btn">
            Cart <span class="cart-count" id="cart-counter">0</span>
        </button>
    </header>

    <section class="hero">
        <h1>Curated Future Aesthetics</h1>
        <p>Explore premium gear, minimalistic desk items, and smart ecosystem devices.</p>
    </section>

    <div class="container">
        <div class="products-grid" id="products-container"></div>
    </div>

    <!-- Cart Sidebar Element -->
    <div class="cart-overlay" id="cart-overlay"></div>
    <div class="cart-drawer" id="cart-drawer">
        <div class="cart-header">
            <h2>Your Cart</h2>
            <button class="close-cart" id="close-cart-btn">&times;</button>
        </div>
        <div class="cart-items-container" id="cart-items-list">
            <!-- Items added dynamically -->
        </div>
        <div class="cart-footer">
            <div class="cart-total-row">
                <span>Total:</span>
                <span id="cart-total-price">₹0</span>
            </div>
            <button class="checkout-btn" id="checkout-btn">Proceed to Pay via WhatsApp</button>
        </div>
    </div>

    <script>
        // Database arrays containing product information mapped exactly to your uploaded files
        const products = [
            {
                id: 1,
                title: "3-in-1 Foldable Wireless Charger",
                price: 1899,
                images: ["1000196435.jpg", "1000196436.jpg", "1000196437.jpg"]
            },
            {
                id: 2,
                title: "Bluetooth Sleep Headphones Eye Mask",
                price: 1249,
                images: ["1000196438.jpg", "1000196439.jpg", "1000196440.jpg"]
            },
            {
                id: 3,
                title: "Smart Sunrise Wake-Up Light Alarm Clock",
                price: 2499,
                images: ["1000196441.jpg", "1000196442.jpg", "1000196443.jpg"]
            },
            {
                id: 4,
                title: "Sunset Atmosphere Projection Lamp",
                price: 799,
                images: ["1000196444.jpg", "1000196445.jpg", "1000196446.jpg"]
            },
            {
                id: 5,
                title: "Loop Quiet Noise-Reduction Earplugs",
                price: 699,
                images: ["1000196447.jpg", "1000196448.jpg", "1000196449.jpg"]
            },
            {
                id: 6,
                title: "Crystal Ball Glowing Moon Night Light",
                price: 999,
                images: ["1000191082.png", "1000177275.png", "1000191083.png"]
            }
        ];

        let cart = [];

        // Generate the dynamic HTML cards onto the grid setup
        function displayProducts() {
            const container = document.getElementById('products-container');
            container.innerHTML = '';

            products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                
                // Constructing images slideshow feature
                let imgDots = '';
                if(product.images.length > 1) {
                    product.images.forEach((_, idx) => {
                        imgDots += `<div class="nav-dot ${idx === 0 ? 'active' : ''}" onclick="switchCardImage(this, '${product.images[idx]}')"></div>`;
                    });
                }

                card.innerHTML = `
                    <div class="image-container">
                        <img src="${product.images[0]}" class="product-image" alt="${product.title}">
                        <div class="image-nav">${imgDots}</div>
                    </div>
                    <div class="product-info">
                        <h3 class="product-title">${product.title}</h3>
                        <p class="product-price">₹${product.price}</p>
                        <button class="add-to-cart-btn" onclick="addToCart(${product.id})">Add To Cart</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Image selector dots functionality
        function switchCardImage(dotElement, imageName) {
            const container = dotElement.closest('.image-container');
            const img = container.querySelector('.product-image');
            img.src = imageName;

            container.querySelectorAll('.nav-dot').forEach(d => d.classList.remove('active'));
            dotElement.classList.add('active');
        }

        // Cart functions and processing updates
        function addToCart(productId) {
            const item = products.find(p => p.id === productId);
            cart.push(item);
            updateCartUI();
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById('cart-counter').innerText = cart.length;
            
            const listContainer = document.getElementById('cart-items-list');
            listContainer.innerHTML = '';
            
            let totalPrice = 0;

            cart.forEach((item, index) => {
                totalPrice += item.price;
                const element = document.createElement('div');
                element.className = 'cart-item';
                element.innerHTML = `
                    <img src="${item.images[0]}" class="cart-item-img">
                    <div class="cart-item-details">
                        <h4 class="cart-item-title">${item.title}</h4>
                        <p class="cart-item-price">₹${item.price}</p>
                    </div>
                    <button class="remove-item" onclick="removeFromCart(${index})">Remove</button>
                `;
                listContainer.appendChild(element);
            });

            document.getElementById('cart-total-price').innerText = '₹' + totalPrice;
        }

        // Sidebar navigation click actions
        const drawer = document.getElementById('cart-drawer');
        const overlay = document.getElementById('cart-overlay');

        document.getElementById('open-cart-btn').addEventListener('click', () => {
            drawer.classList.add('open');
            overlay.classList.add('show');
        });

        document.getElementById('close-cart-btn').addEventListener('click', () => {
            drawer.classList.remove('open');
            overlay.classList.remove('show');
        });

        overlay.addEventListener('click', () => {
            drawer.classList.remove('open');
            overlay.classList.remove('show');
        });

        // Redirects payment details over standard text via WhatsApp link API
        document.getElementById('checkout-btn').addEventListener('click', () => {
            if(cart.length === 0) {
                alert('Your cart is empty.');
                return;
            }

            let messageText = 'Hello OS Tech Hub! I want to order:\n\n';
            let grandTotal = 0;
            
            cart.forEach((item, index) => {
                messageText += `${index + 1}. ${item.title} - ₹${item.price}\n`;
                grandTotal += item.price;
            });

            messageText += `\nTotal Bill: ₹${grandTotal}\nPlease share payment instructions!`;
            
            // Replaces text string into safe URL characters
            const encryptedMessage = encodeURIComponent(messageText);
            window.open(`https://wa.me/91XXXXXXXXXX?text=${encryptedMessage}`, '_blank');
        });

        // Initialize the app view instantly
        window.onload = displayProducts;
    </script>
</body>
</html>
